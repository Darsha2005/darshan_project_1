<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical Information</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f4f6f9;
}

.container-box{
    margin-top:60px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.table thead{
    background:#0d6efd;
    color:white;
}
</style>

</head>

<body>

<div class="container">

<div class="container-box">

<h2 class="text-center mb-4">🏥 Medical Patient Information    (Sample Data)</h2>

<table class="table table-bordered table-hover table-striped text-center">

<thead>
<tr>
<th>ID</th>
<th>Patient Name</th>
<th>Age</th>
<th>Disease</th>
<th>Block</th>
<th>Update</th>
<th>Delete</th>
</tr>
</thead>

<tbody>

{% for p in patient %}
<tr>
<td>{{ p.id }}</td>
<td>{{ p.patientName }}</td>
<td>{{ p.Age }}</td>
<td>{{ p.disease }}</td>
<td>{{ p.block }}</td>
<td><button type="submit"><a href="{% url 'updateData' p.id %}" target="_blank">Update</a></button></td>
<td><button type="submit"><a href="{% url 'deleteData' p.id %}" target="_blank">Update</a></button></td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
